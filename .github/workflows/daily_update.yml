name: Daily OpenBet ML Pipeline

# This schedules the script to run automatically
on:
  schedule:
    # Runs at 10:00 AM UTC (5:00 AM EST) every single day
    - cron: '0 10 * * *'
  # Allows you to click a button in GitHub to run it manually for testing
  workflow_dispatch: 

jobs:
  update-data-and-predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn kaggle requests joblib
          # Fallback just in case you add a requirements.txt later
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download Latest Kaggle CSVs
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          # 1. Download the historical dataset straight to the root folder
          kaggle datasets download -d eoinamoore/historical-nba-data-and-player-box-scores --unzip -o
          
          # 2. Create the data/ folder and move the CSVs inside so your scripts can find them
          mkdir -p data
          mv *.csv data/

      - name: Run Prediction Scripts
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          # Running from the root folder, exactly where your files are!
          python update_history.py
          python model_train.py
          python model_train_players.py
          python daily_update.py
          python daily_player_props.py

      - name: Commit and Push Updated Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated ML Pipeline: Updated daily JSON predictions"
          # Only committing the JSONs so we don't violate your .gitignore!
          file_pattern: "*.json"
